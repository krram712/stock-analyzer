version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  Stock Analyser – Docker Compose (Production-ready)
#
#  Usage:
#    1. Copy .env.example to .env and fill in ANTHROPIC_API_KEY
#    2. docker compose up --build
#    3. Open http://localhost  (frontend)
#       Backend API at http://localhost:8080/api/v1/health
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Spring Boot API ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-analyzer-backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALLOWED_ORIGINS=http://localhost,http://localhost:3000,http://frontend
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── React Frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty → nginx proxies /api/* to backend service
        REACT_APP_API_BASE_URL: ""
    container_name: stock-analyzer-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  app-net:
    driver: bridge
