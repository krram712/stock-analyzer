# ─────────────────────────────────────────────────────────────────────────────
#  Stock Analyser – Spring Boot Configuration
#  Set ANTHROPIC_API_KEY as an environment variable (never hardcode in source).
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=stock-analyzer-backend
server.port=8080

# ── Anthropic ────────────────────────────────────────────────────────────────
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
anthropic.max-tokens=8192
anthropic.api-version=2023-06-01
anthropic.beta=web-search-2025-03-05
anthropic.timeout-seconds=120
anthropic.max-retries=2

# ── WebClient ────────────────────────────────────────────────────────────────
spring.webflux.client.connect-timeout=10000
spring.webflux.client.read-timeout=120000

# ── Cache (in-memory; swap for Redis in production) ──────────────────────────
spring.cache.type=simple
# Results are expensive to generate; cache for 1 hour
cache.analysis.ttl-seconds=3600

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.stockanalyzer=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── CORS (override in production via env var) ─────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:80}

# ── Rate Limiting (requests per minute per IP) ───────────────────────────────
app.rate-limit.requests-per-minute=10