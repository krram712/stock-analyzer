# ─────────────────────────────────────────────────────────────────────────────
#  Stock Analyser – Spring Boot Configuration
#  Set ANTHROPIC_API_KEY as an environment variable (never hardcode in source).
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=stock-analyzer-backend
# Railway sets PORT env var — must use it, fall back to 8080 locally
server.port=${PORT:8080}

# ── Google Gemini (primary — has web search grounding) ───────────────────────
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent
# Hardcoded — gemini-1.5-flash has 15 RPM / 1500 RPD free tier (do NOT use GEMINI_MODEL env var override)
gemini.model=gemini-1.5-flash-latest
gemini.max-tokens=8192
gemini.timeout-seconds=270
gemini.max-retries=1

# ── Groq (fallback #1 — free 30 RPM, very fast) ──────────────────────────────
# Free key: https://console.groq.com/keys  (no credit card)
groq.api.key=${GROQ_API_KEY:}
groq.model=llama-3.3-70b-versatile

# ── OpenRouter (fallback #2 — free model pool) ────────────────────────────────
# Free key: https://openrouter.ai/keys  (no credit card, many free models)
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model=meta-llama/llama-3.3-70b-instruct:free

# ── Cerebras (fallback #3 — ultra-fast, free tier) ────────────────────────────
# Free key: https://cloud.cerebras.ai  (no credit card)
cerebras.api.key=${CEREBRAS_API_KEY:}
cerebras.model=llama-3.3-70b

# ── WebClient ────────────────────────────────────────────────────────────────
spring.webflux.client.connect-timeout=10000
spring.webflux.client.read-timeout=120000

# ── Cache (in-memory; swap for Redis in production) ──────────────────────────
spring.cache.type=simple
# Results are expensive to generate; cache for 1 hour
cache.analysis.ttl-seconds=3600

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.stockanalyzer=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── CORS (override in production via env var) ─────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:80,https://*.vercel.app}

# ── Rate Limiting (requests per minute per IP) ───────────────────────────────
app.rate-limit.requests-per-minute=10