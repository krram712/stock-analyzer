# ─────────────────────────────────────────────────────────────────────────────
#  Stock Analyser – Spring Boot Configuration
#  Set ANTHROPIC_API_KEY as an environment variable (never hardcode in source).
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=stock-analyzer-backend
server.port=8080

# ── Google Gemini ─────────────────────────────────────────────────────────────
# Free tier: 15 RPM / 1,500 RPD on gemini-1.5-flash  →  https://aistudio.google.com/apikey
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.max-tokens=16384
gemini.timeout-seconds=180
gemini.max-retries=3

# ── WebClient ────────────────────────────────────────────────────────────────
spring.webflux.client.connect-timeout=10000
spring.webflux.client.read-timeout=120000

# ── Cache (in-memory; swap for Redis in production) ──────────────────────────
spring.cache.type=simple
# Results are expensive to generate; cache for 1 hour
cache.analysis.ttl-seconds=3600

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.stockanalyzer=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── CORS (override in production via env var) ─────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:80,https://*.vercel.app}

# ── Rate Limiting (requests per minute per IP) ───────────────────────────────
app.rate-limit.requests-per-minute=10